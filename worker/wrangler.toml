name = "mezan-chat"
main = "index.js"
compatibility_date = "2024-09-01"

[vars]
# Google OAuth 2.0 web client ID used to verify Google ID tokens.
GOOGLE_CLIENT_ID = "REPLACE_WITH_YOUR_GOOGLE_OAUTH_CLIENT_ID"

[ai]
binding = "AI"

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"
