<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mezan Tests</title>
  <style>
    body{font-family:system-ui,sans-serif;background:#070a10;color:#f4f8ff;max-width:760px;margin:40px auto;padding:20px}
    h1{margin-bottom:20px}.test{padding:12px;margin:8px 0;border-radius:10px;background:#131d2d}.pass{border-right:4px solid #18c8a3}.fail{border-right:4px solid #ff6b83}
  </style>
</head>
<body>
  <h1>اختبارات ميزان</h1>
  <div id="results"></div>
  <script src="js/storage.js?v=20260615-4"></script>
  <script src="js/calculations.js?v=20260615-4"></script>
  <script src="js/translations.js?v=20260615-4"></script>
  <script src="js/currency.js?v=20260615-4"></script>
  <script src="js/ui.js?v=20260615-4"></script>
  <script>
    const results = document.getElementById('results');
    function test(name, run) {
      const row = document.createElement('div');
      row.className = 'test';
      try {
        run();
        row.classList.add('pass');
        row.textContent = `نجح: ${name}`;
      } catch (error) {
        row.classList.add('fail');
        row.textContent = `فشل: ${name} - ${error.message}`;
      }
      results.appendChild(row);
    }
    function equal(actual, expected) {
      if (actual !== expected) throw new Error(`${actual} !== ${expected}`);
    }

    test('تعقيم HTML', () => equal(MezanUI.escapeHtml('<img onerror="x">'), '&lt;img onerror=&quot;x&quot;&gt;'));
    test('تنظيف الأرقام', () => equal(MezanCalculations.number('1,250.50'), 1250.5));
    test('حساب النسبة', () => equal(MezanCalculations.percent(250, 1000), 25));
    test('رمز العملة حسب اللغة', () => {
      equal(MezanCurrency.symbol('QAR', 'ar'), 'ر.ق');
      equal(MezanCurrency.symbol('QAR', 'en'), 'QAR');
    });
    test('حساب الخطة', () => {
      const totals = MezanCalculations.wizardTotals({ salary: 10000, extraIncome: 500, rent: 3000, saveTarget: 1000 });
      equal(totals.free, 6500);
    });
    test('الخطة المستحيلة تنتج عجزاً', () => {
      const totals = MezanCalculations.wizardTotals({ salary: 5000, rent: 4500, saveTarget: 1000 });
      equal(totals.free, -500);
    });
    test('المتبقي من الراتب يخصم جميع مصاريف الدورة', () => {
      const balance = MezanCalculations.cycleBalance({
        salary: 10000,
        extraIncome: 500,
        fixed: 3000,
        saving: 1000,
        expenses: [{ amount: 400 }, { amount: 200 }, { amount: 100 }]
      });
      equal(balance.startAvailable, 6500);
      equal(balance.spent, 700);
      equal(balance.remaining, 5800);
    });
    test('تراكم التوفير عبر الدورات', () => {
      const progress = MezanCalculations.savingsProgress(10000, [
        { saved: 1500 },
        { saved: 2200 },
        { saved: 800 }
      ]);
      equal(progress.saved, 4500);
      equal(progress.remaining, 5500);
      equal(progress.progress, 45);
    });
    test('التصنيف التلقائي يدعم التجار العرب', () => {
      equal(MezanCalculations.classifyMerchant('مطعم الشام'), 'food');
      equal(MezanCalculations.classifyMerchant('محطة وقود'), 'transport');
      equal(MezanCalculations.classifyMerchant('فاتورة كهرباء'), 'bills');
    });
    test('التصنيف يتعلم اختيار المستخدم', () => {
      equal(MezanCalculations.classifyMerchant('متجر خاص', { 'متجر خاص': 'fun' }), 'fun');
    });
    test('ترحيل التصنيف القديم', () => {
      const state = MezanStorage.normalize({
        settings: { lang: 'ar', currency: 'QAR' },
        profile: null,
        expenses: [{ amount: 10, merchant: 'متجر', category: 'طعام وتسوق', date: '2026-06-14' }]
      });
      equal(state.expenses[0].category, 'food');
    });
    test('ترحيل الميزانيات والدفعات المتكررة', () => {
      const state = MezanStorage.normalize({
        settings: { lang: 'ar', currency: 'QAR' },
        profile: { salary: 9000, salaryDate: '2026-06-25' },
        expenses: [],
        categoryBudgets: { food: 1200 },
        recurringPayments: [{ name: 'إنترنت', amount: 250, day: 31, category: 'فواتير' }]
      });
      equal(state.categoryBudgets.food, 1200);
      equal(state.recurringPayments[0].category, 'bills');
      equal(state.recurringPayments[0].day, 31);
    });
    test('ترحيل تاريخ الراتب إلى سجل استلام', () => {
      const state = MezanStorage.normalize({
        settings: { lang: 'ar', currency: 'QAR' },
        profile: { salary: 9000, salaryDate: '2026-05-11' },
        expenses: []
      });
      equal(state.salaryReceipts[0].date, '2026-05-11');
      equal(state.salaryReceipts[0].amount, 9000);
    });
    test('ترقية البيانات إلى schema v4', () => {
      const state = MezanStorage.normalize({
        settings: { lang: 'ar', currency: 'QAR', lastBackupAt: '2026-06-01' },
        profile: { salary: 9000, salaryDate: '2026-05-11' },
        merchantCategories: { 'متجر خاص': 'ترفيه' }
      });
      equal(state.schemaVersion, 4);
      equal(state.settings.lastBackupAt, '2026-06-01');
      equal(state.merchantCategories['متجر خاص'], 'fun');
    });
    test('قراءة مفتاح v3 وترحيله دون فقدان البيانات', () => {
      const current = localStorage.getItem('mezan_plan_v4');
      const legacy = localStorage.getItem('mezan_plan_v3');
      try {
        localStorage.removeItem('mezan_plan_v4');
        localStorage.setItem('mezan_plan_v3', JSON.stringify({
          settings: { lang: 'ar', currency: 'QAR' },
          profile: { salary: 7000, salaryDate: '2026-05-01' },
          expenses: [{ amount: 50, merchant: 'متجر', category: 'أخرى', date: '2026-05-02' }]
        }));
        const migrated = MezanStorage.load();
        equal(migrated.schemaVersion, 4);
        equal(migrated.profile.salary, 7000);
        equal(migrated.expenses[0].amount, 50);
        equal(JSON.parse(localStorage.getItem('mezan_plan_v4')).schemaVersion, 4);
      } finally {
        if (current === null) localStorage.removeItem('mezan_plan_v4');
        else localStorage.setItem('mezan_plan_v4', current);
        if (legacy === null) localStorage.removeItem('mezan_plan_v3');
        else localStorage.setItem('mezan_plan_v3', legacy);
      }
    });
    test('استيراد بيانات جزئية يحافظ على القيم الافتراضية', () => {
      const state = MezanStorage.parseBackup('{"settings":{"currency":"USD"},"expenses":"invalid"}');
      equal(state.settings.currency, 'USD');
      equal(state.settings.lang, 'ar');
      equal(state.expenses.length, 0);
      equal(state.schemaVersion, 4);
    });
    test('الدورة تبقى مفتوحة حتى الراتب التالي', () => {
      const cycle = MezanCalculations.receiptCycle([
        { date: '2026-04-01', amount: 8000 },
        { date: '2026-05-11', amount: 8000 }
      ], new Date(2026, 5, 30));
      equal(cycle.start, '2026-05-11');
      equal(cycle.end, '2026-06-30');
      equal(cycle.open, true);
      equal(MezanCalculations.inCycle('2026-06-30', cycle), true);
    });
    test('الراتب التالي يغلق الدورة السابقة', () => {
      const cycle = MezanCalculations.closedReceiptCycle('2026-04-01', '2026-05-11');
      equal(cycle.end, '2026-05-10');
      equal(MezanCalculations.cycleProgress(cycle, new Date(2026, 4, 10)).total, 40);
      equal(MezanCalculations.inCycle('2026-05-10', cycle), true);
      equal(MezanCalculations.inCycle('2026-05-11', cycle), false);
    });
    test('دورة الراتب من يوم 25', () => {
      const cycle = MezanCalculations.salaryCycle('2026-01-25', new Date(2026, 5, 14));
      equal(cycle.start, '2026-05-25');
      equal(cycle.end, '2026-06-24');
      equal(MezanCalculations.inCycle('2026-06-01', cycle), true);
      equal(MezanCalculations.inCycle('2026-06-25', cycle), false);
    });
    test('دورة راتب يوم 31 تتوافق مع الشهر القصير', () => {
      const cycle = MezanCalculations.salaryCycle('2026-01-31', new Date(2026, 2, 15));
      equal(cycle.start, '2026-02-28');
      equal(cycle.end, '2026-03-30');
      equal(MezanCalculations.recurringDate(31, cycle), '2026-02-28');
    });
    test('رفض نسخة احتياطية غير صالحة', () => {
      let rejected = false;
      try { MezanStorage.parseBackup('[]'); } catch { rejected = true; }
      equal(rejected, true);
    });
    test('التاريخ المحلي', () => equal(MezanUI.localDate(new Date(2026, 5, 4)), '2026-06-04'));
  </script>
</body>
</html>
