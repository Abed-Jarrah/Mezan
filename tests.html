<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mezan Tests</title>
  <style>
    body{font-family:system-ui,sans-serif;background:#070a10;color:#f4f8ff;max-width:760px;margin:40px auto;padding:20px}
    h1{margin-bottom:20px}.test{padding:12px;margin:8px 0;border-radius:10px;background:#131d2d}.pass{border-right:4px solid #18c8a3}.fail{border-right:4px solid #ff6b83}
  </style>
</head>
<body>
  <h1>اختبارات ميزان</h1>
  <div id="results"></div>
  <script src="js/storage.js?v=20260618-sec1"></script>
  <script src="js/sync.js"></script>
  <script src="js/calculations.js?v=20260618-sec1"></script>
  <script src="js/translations.js?v=20260618-sec1"></script>
  <script src="js/currency.js?v=20260618-sec1"></script>
  <script src="js/ui.js?v=20260618-sec1"></script>
  <script src="js/auth.js?v=20260619-auth1"></script>
  <script>
    const results = document.getElementById('results');
    function test(name, run) {
      const row = document.createElement('div');
      row.className = 'test';
      try {
        run();
        row.classList.add('pass');
        row.textContent = `نجح: ${name}`;
      } catch (error) {
        row.classList.add('fail');
        row.textContent = `فشل: ${name} - ${error.message}`;
      }
      results.appendChild(row);
    }
    function equal(actual, expected) {
      if (actual !== expected) throw new Error(`${actual} !== ${expected}`);
    }
    function throws(run, expectedMessage) {
      try {
        run();
      } catch (error) {
        if (expectedMessage) equal(error.message, expectedMessage);
        return;
      }
      throw new Error('Expected function to throw');
    }

    test('تعقيم HTML', () => equal(MezanUI.escapeHtml('<img onerror="x">'), '&lt;img onerror=&quot;x&quot;&gt;'));
    test('فك حمولة JWT للعرض فقط', () => {
      const profile = MezanAuth.decodeIdTokenForDisplay('header.eyJuYW1lIjoiVGVzdGVyIiwiZW1haWwiOiJ0QGV4YW1wbGUuY29tIiwicGljdHVyZSI6Imh0dHBzOi8vZXhhbXBsZS5jb20vcGljLmpwZyJ9.signature');
      equal(profile.name, 'Tester');
      equal(profile.email, 't@example.com');
    });
    test('فك JWT غير صالح للعرض لا يرمي خطأ', () => equal(MezanAuth.decodeIdTokenForDisplay('invalid'), null));
    test('تنظيف الأرقام', () => equal(MezanCalculations.number('1,250.50'), 1250.5));
    test('حساب النسبة', () => equal(MezanCalculations.percent(250, 1000), 25));
    test('رمز العملة حسب اللغة', () => {
      equal(MezanCurrency.symbol('QAR', 'ar'), 'ر.ق');
      equal(MezanCurrency.symbol('QAR', 'en'), 'QAR');
      equal(MezanCurrency.format(12.5), '12.5');
    });
    test('حساب الخطة', () => {
      const totals = MezanCalculations.wizardTotals({ salary: 10000, extraIncome: 500, rent: 3000, saveTarget: 1000 });
      equal(totals.free, 6500);
    });
    test('الخطة المستحيلة تنتج عجزاً', () => {
      const totals = MezanCalculations.wizardTotals({ salary: 5000, rent: 4500, saveTarget: 1000 });
      equal(totals.free, -500);
    });
    test('المتبقي من الراتب يخصم جميع مصاريف الدورة', () => {
      const balance = MezanCalculations.cycleBalance({
        salary: 10000,
        extraIncome: 500,
        fixed: 3000,
        saving: 1000,
        expenses: [{ amount: 400 }, { amount: 200 }, { amount: 100 }]
      });
      equal(balance.startAvailable, 6500);
      equal(balance.spent, 700);
      equal(balance.remaining, 5800);
    });
    test('تراكم التوفير عبر الدورات', () => {
      const progress = MezanCalculations.savingsProgress(10000, [
        { saved: 1500 },
        { saved: 2200 },
        { saved: 800 }
      ]);
      equal(progress.saved, 4500);
      equal(progress.remaining, 5500);
      equal(progress.progress, 45);
    });
    test('التصنيف التلقائي يدعم التجار العرب', () => {
      equal(MezanCalculations.classifyMerchant('مطعم الشام'), 'food');
      equal(MezanCalculations.classifyMerchant('محطة وقود'), 'transport');
      equal(MezanCalculations.classifyMerchant('فاتورة كهرباء'), 'bills');
    });
    test('التصنيف يتعلم اختيار المستخدم', () => {
      equal(MezanCalculations.classifyMerchant('متجر خاص', { 'متجر خاص': 'fun' }), 'fun');
    });
    test('ترحيل التصنيف القديم', () => {
      const state = MezanStorage.normalize({
        settings: { lang: 'ar', currency: 'QAR' },
        profile: null,
        expenses: [{ amount: 10, merchant: 'متجر', category: 'طعام وتسوق', date: '2026-06-14' }]
      });
      equal(state.expenses[0].category, 'food');
    });
    test('ترحيل الميزانيات والدفعات المتكررة', () => {
      const state = MezanStorage.normalize({
        settings: { lang: 'ar', currency: 'QAR' },
        profile: { salary: 9000, salaryDate: '2026-06-25' },
        expenses: [],
        categoryBudgets: { food: 1200 },
        recurringPayments: [{ name: 'إنترنت', amount: 250, day: 31, category: 'فواتير' }]
      });
      equal(state.categoryBudgets.food, 1200);
      equal(state.recurringPayments[0].category, 'bills');
      equal(state.recurringPayments[0].day, 31);
    });
    test('ترحيل تاريخ الراتب إلى سجل استلام', () => {
      const state = MezanStorage.normalize({
        settings: { lang: 'ar', currency: 'QAR' },
        profile: { salary: 9000, salaryDate: '2026-05-11' },
        expenses: []
      });
      equal(state.salaryReceipts[0].date, '2026-05-11');
      equal(state.salaryReceipts[0].amount, 9000);
    });
    test('ترقية البيانات إلى schema v5', () => {
      const state = MezanStorage.normalize({
        settings: { lang: 'ar', currency: 'QAR', lastBackupAt: '2026-06-01' },
        profile: { salary: 9000, salaryDate: '2026-05-11' },
        merchantCategories: { 'متجر خاص': 'ترفيه' }
      });
      equal(state.schemaVersion, 5);
      equal(state.settings.lastBackupAt, '2026-06-01');
      equal(state.merchantCategories['متجر خاص'], 'fun');
    });
    test('قراءة مفتاح v4 وترحيله دون فقدان البيانات', () => {
      const current = localStorage.getItem('mezan_plan_v5');
      const legacy = localStorage.getItem('mezan_plan_v4');
      try {
        localStorage.removeItem('mezan_plan_v5');
        localStorage.setItem('mezan_plan_v4', JSON.stringify({
          settings: { lang: 'ar', currency: 'QAR' },
          profile: { salary: 7000, salaryDate: '2026-05-01' },
          expenses: [{ amount: 50, merchant: 'متجر', category: 'أخرى', date: '2026-05-02' }]
        }));
        const migrated = MezanStorage.load();
        equal(migrated.schemaVersion, 5);
        equal(migrated.profile.salary, 7000);
        equal(migrated.expenses[0].amount, 50);
        equal(JSON.parse(localStorage.getItem('mezan_plan_v5')).schemaVersion, 5);
      } finally {
        if (current === null) localStorage.removeItem('mezan_plan_v5');
        else localStorage.setItem('mezan_plan_v5', current);
        if (legacy === null) localStorage.removeItem('mezan_plan_v4');
        else localStorage.setItem('mezan_plan_v4', legacy);
      }
    });
    test('استيراد بيانات جزئية يحافظ على القيم الافتراضية', () => {
      const state = MezanStorage.parseBackup('{"settings":{"currency":"USD"},"expenses":"invalid"}');
      equal(state.settings.currency, 'USD');
      equal(state.settings.lang, 'ar');
      equal(state.expenses.length, 0);
      equal(state.schemaVersion, 5);
    });
    test('إنشاء معرف مجهول ثابت للمساعد الذكي', () => {
      const state = MezanStorage.normalize({ settings: { chatUserId: 'mzn-test-user' } });
      equal(state.settings.chatUserId, 'mzn-test-user');
      const generated = MezanStorage.normalize({ settings: {} });
      if (!generated.settings.chatUserId) throw new Error('missing chatUserId');
    });
    test('تاريخ راتب مستقبلي في الملف المستورد لا يصبح دورة حالية', () => {
      const today = MezanUI.localDate();
      const state = MezanStorage.normalize({
        settings: {},
        profile: { salary: 9000, salaryDate: '2999-01-01' },
        expenses: []
      });
      equal(state.profile.salaryDate, today);
      equal(state.salaryReceipts[0].date, today);
    });
    test('تاريخ راتب قديم جداً في الملف المستورد لا يصبح دورة حالية', () => {
      const today = MezanUI.localDate();
      const state = MezanStorage.normalize({
        settings: {},
        profile: { salary: 9000, salaryDate: '1925-01-01' },
        expenses: []
      });
      equal(state.profile.salaryDate, today);
      equal(state.salaryReceipts[0].date, today);
    });
    test('سجلات الرواتب المستقبلية تُرفض عند الاستيراد', () => {
      const state = MezanStorage.normalize({
        settings: {},
        salaryReceipts: [
          { amount: 9000, date: '2026-05-01' },
          { amount: 9000, date: '2999-01-01' }
        ]
      });
      equal(state.salaryReceipts.length, 1);
      equal(state.salaryReceipts[0].date, '2026-05-01');
    });
    test('سجلات الرواتب القديمة جداً تُرفض عند الاستيراد', () => {
      const state = MezanStorage.normalize({
        settings: {},
        salaryReceipts: [
          { amount: 9000, date: '1925-01-01' }
        ]
      });
      equal(state.salaryReceipts.length, 0);
    });
    test('حد المصاريف المستوردة لا يتجاوز 5000 سجل', () => {
      const state = MezanStorage.normalize({
        settings: {},
        expenses: Array.from({ length: 5002 }, (_, index) => ({
          id: `expense-${index}`,
          amount: 1,
          date: '2026-06-10',
          category: 'food'
        }))
      });
      equal(state.expenses.length, 5000);
    });
    test('الدورة تبقى مفتوحة حتى الراتب التالي', () => {
      const cycle = MezanCalculations.receiptCycle([
        { date: '2026-04-01', amount: 8000 },
        { date: '2026-05-11', amount: 8000 }
      ], new Date(2026, 5, 30));
      equal(cycle.start, '2026-05-11');
      equal(cycle.end, '2026-06-30');
      equal(cycle.open, true);
      equal(MezanCalculations.inCycle('2026-06-30', cycle, new Date(2026, 5, 30)), true);
      equal(MezanCalculations.inCycle('2026-07-01', cycle, new Date(2026, 5, 30)), false);
    });
    test('الراتب التالي يغلق الدورة السابقة', () => {
      const cycle = MezanCalculations.closedReceiptCycle('2026-04-01', '2026-05-11');
      equal(cycle.end, '2026-05-10');
      equal(MezanCalculations.cycleProgress(cycle, new Date(2026, 4, 10)).total, 40);
      equal(MezanCalculations.inCycle('2026-05-10', cycle), true);
      equal(MezanCalculations.inCycle('2026-05-11', cycle), false);
    });
    test('دورة الراتب من يوم 25', () => {
      const cycle = MezanCalculations.salaryCycle('2026-01-25', new Date(2026, 5, 14));
      equal(cycle.start, '2026-05-25');
      equal(cycle.end, '2026-06-24');
      equal(MezanCalculations.inCycle('2026-06-01', cycle), true);
      equal(MezanCalculations.inCycle('2026-06-25', cycle), false);
    });
    test('دورة راتب يوم 31 تتوافق مع الشهر القصير', () => {
      const cycle = MezanCalculations.salaryCycle('2026-01-31', new Date(2026, 2, 15));
      equal(cycle.start, '2026-02-28');
      equal(cycle.end, '2026-03-30');
      equal(MezanCalculations.recurringDate(31, cycle), '2026-02-28');
    });
    test('راتب يوم 31 يتوافق مع فبراير في سنة كبيسة', () => {
      const cycle = MezanCalculations.salaryCycle('2024-01-31', new Date(2024, 2, 15));
      equal(cycle.start, '2024-02-29');
      equal(cycle.end, '2024-03-30');
    });
    test('راتب يوم 31 يتوافق مع فبراير في سنة غير كبيسة', () => {
      const cycle = MezanCalculations.salaryCycle('2025-01-31', new Date(2025, 2, 15));
      equal(cycle.start, '2025-02-28');
      equal(cycle.end, '2025-03-30');
    });
    test('راتب يوم 31 يتوافق مع يونيو ذي الثلاثين يوماً', () => {
      const cycle = MezanCalculations.salaryCycle('2026-01-31', new Date(2026, 6, 15));
      equal(cycle.start, '2026-06-30');
      equal(cycle.end, '2026-07-30');
    });
    test('فشل امتلاء التخزين ينتقل للمستدعي دون تلف صامت', () => {
      const original = Storage.prototype.setItem;
      let quotaRaised = false;
      try {
        Storage.prototype.setItem = () => { throw new DOMException('Quota exceeded', 'QuotaExceededError'); };
        try { MezanStorage.save(MezanStorage.defaults()); } catch (error) {
          quotaRaised = error.name === 'QuotaExceededError';
        }
      } finally {
        Storage.prototype.setItem = original;
      }
      equal(quotaRaised, true);
    });
    test('رفض نسخة احتياطية غير صالحة', () => {
      let rejected = false;
      try { MezanStorage.parseBackup('[]'); } catch { rejected = true; }
      equal(rejected, true);
    });
    test('رفض التواريخ المستحيلة من التخزين', () => {
      const state = MezanStorage.normalize({
        settings: {},
        expenses: [{ amount: 20, date: '2026-02-30', category: 'food' }]
      });
      equal(state.expenses.length, 0);
    });
    test('التصنيفات الإنجليزية غير حساسة لحالة الأحرف', () => {
      const state = MezanStorage.normalize({
        settings: {},
        expenses: [{ amount: 20, date: '2026-06-10', category: 'FOOD' }]
      });
      equal(state.expenses[0].category, 'food');
    });
    test('مفاتيح التصنيف الخطرة لا تدخل قاموس التجار', () => {
      const state = MezanStorage.normalize({
        settings: {},
        merchantCategories: { '__proto__': 'food', constructor: 'fun', prototype: 'bills', 'متجر آمن': 'food' }
      });
      equal(state.merchantCategories['متجر آمن'], 'food');
      equal(Object.prototype.hasOwnProperty.call(state.merchantCategories, '__proto__'), false);
      equal(Object.prototype.hasOwnProperty.call(state.merchantCategories, 'constructor'), false);
      equal(Object.prototype.hasOwnProperty.call(state.merchantCategories, 'prototype'), false);
    });
    test('تعقيم مفاتيح التقارير والأنواع المستوردة', () => {
      const state = MezanStorage.normalize({
        settings: {},
        cycleReports: [{
          start: '2026-05-01', end: '2026-05-30', topKey: '<img>',
          breakdown: [{ key: '<script>', amount: 10 }],
          expenses: [{ amount: 10, date: '2026-05-02', subtype: '<img>' }]
        }]
      });
      equal(state.cycleReports[0].topKey, 'other');
      equal(state.cycleReports[0].breakdown[0].key, 'other');
      equal(state.cycleReports[0].expenses[0].subtype, '');
    });
    test('لقطة الخطة تحفظ دخل الدورة والتزاماتها', () => {
      const state = MezanStorage.normalize({
        settings: {},
        profile: { salary: 9000, salaryDate: '2026-05-01' },
        salaryReceipts: [{
          date: '2026-05-01', amount: 9100,
          planSnapshot: { extraIncome: 300, rent: 2500, saveTarget: 1000 }
        }]
      });
      equal(state.salaryReceipts[0].planSnapshot.rent, 2500);
      equal(state.salaryReceipts[0].planSnapshot.extraIncome, 300);
    });
    test('التوفير المحقق لا يتجاوز الهدف المخطط', () => {
      const report = MezanCalculations.completedCycleReport({
        salary: 10000,
        plan: { extraIncome: 500, rent: 3000, saveTarget: 1500 },
        expenses: [{ amount: 1000 }, { amount: 500 }]
      });
      equal(report.spent, 4500);
      equal(report.saved, 1500);
    });
    test('العجز يمنع احتساب توفير محقق', () => {
      const report = MezanCalculations.completedCycleReport({
        salary: 5000,
        plan: { rent: 4000, saveTarget: 1000 },
        expenses: [{ amount: 1500 }]
      });
      equal(report.saved, 0);
    });
    test('ملخص اليوم يحسب صرف اليوم والمتاح المقترح', () => {
      const summary = MezanCalculations.dailySummary({
        cycle: { start: '2026-06-01', end: '2026-06-30', endExclusive: '2026-07-01' },
        remaining: 900,
        expenses: [
          { amount: 100, date: '2026-06-10' },
          { amount: 40, date: '2026-06-10' },
          { amount: 300, date: '2026-06-09' }
        ],
        today: new Date(2026, 5, 10)
      });
      equal(summary.spentToday, 140);
      equal(summary.daysLeft, 21);
      equal(summary.dailyAvailable, 43);
      equal(summary.status, 'over');
    });
    test('ملخص اليوم لا يحذر عندما لا يوجد صرف ولا متاح', () => {
      const summary = MezanCalculations.dailySummary({
        cycle: { start: '2026-06-01', end: '2026-06-30', endExclusive: '2026-07-01' },
        remaining: 0,
        expenses: [],
        today: new Date(2026, 5, 10)
      });
      equal(summary.dailyAvailable, 0);
      equal(summary.spentToday, 0);
      equal(summary.status, 'good');
    });
    test('ملخص اليوم يقدر الأيام المتبقية للدورة المفتوحة من يوم الراتب', () => {
      const summary = MezanCalculations.dailySummary({
        cycle: { start: '2026-06-16', end: '2026-06-20', endExclusive: '', open: true, salaryDay: 16 },
        remaining: 6500,
        expenses: [{ amount: 500, date: '2026-06-16' }],
        today: new Date(2026, 5, 16)
      });
      equal(summary.daysLeft, 30);
      equal(summary.dailyAvailable, 217);
      equal(summary.status, 'over');
    });
    test('التاريخ المحلي', () => equal(MezanUI.localDate(new Date(2026, 5, 4)), '2026-06-04'));
    test('Sync checksum is deterministic across key order', () => {
      equal(MezanSync.checksum({ b: 2, nested: { y: true, x: 1 }, a: 1 }), MezanSync.checksum({ a: 1, nested: { x: 1, y: true }, b: 2 }));
      if (MezanSync.checksum({ a: 1 }) === MezanSync.checksum({ a: 2 })) throw new Error('Different payloads must have different checksums');
    });
    test('Sync wrap and unwrap preserve payload and metadata', () => {
      const payload = { profile: { salary: 9000 }, expenses: [{ amount: 20 }] };
      const envelope = MezanSync.wrap(payload, { deviceId: 'device-a', rev: 3 });
      const result = MezanSync.unwrap(envelope);
      equal(JSON.stringify(result.payload), JSON.stringify(payload));
      equal(result.meta.schemaVersion, MezanSync.SCHEMA_VERSION);
      equal(result.meta.rev, 3);
      equal(result.meta.deviceId, 'device-a');
      equal(typeof result.meta.updatedAt, 'string');
    });
    test('Sync wrap validates revision and device ID', () => {
      throws(() => MezanSync.wrap({}, { deviceId: 'device-a', rev: -1 }), 'Invalid sync wrap options');
      throws(() => MezanSync.wrap({}, { deviceId: '', rev: 0 }), 'Invalid sync wrap options');
    });
    test('Sync unwrap rejects tampered payloads', () => {
      const envelope = MezanSync.wrap({ amount: 20 }, { deviceId: 'device-a', rev: 0 });
      envelope.payload.amount = 25;
      throws(() => MezanSync.unwrap(envelope), 'checksum_mismatch');
    });
    test('Sync unwrap rejects malformed envelopes', () => {
      throws(() => MezanSync.unwrap({}), 'Invalid sync envelope');
    });
    test('Sync revision increments monotonically', () => equal(MezanSync.nextRev(4), 5));
    test('Sync migration keeps the current schema envelope unchanged', () => {
      const envelope = MezanSync.wrap({ amount: 20 }, { deviceId: 'device-a', rev: 0 });
      equal(MezanSync.migrate(envelope), envelope);
    });
    test('Sync conflict detection handles core and first-sync states', () => {
      equal(MezanSync.detectConflict({ baseRevisionId: 'r1', hasLocalEdits: true }, { revisionId: 'r1' }), 'fresh');
      equal(MezanSync.detectConflict({ baseRevisionId: 'r1', hasLocalEdits: false }, { revisionId: 'r2' }), 'remote_ahead');
      equal(MezanSync.detectConflict({ baseRevisionId: 'r1', hasLocalEdits: true }, { revisionId: 'r2' }), 'conflict');
      equal(MezanSync.detectConflict({ baseRevisionId: null, hasLocalEdits: false }, { revisionId: null }), 'fresh');
      equal(MezanSync.detectConflict({ baseRevisionId: null, hasLocalEdits: false }, { revisionId: 'r1' }), 'remote_ahead');
      equal(MezanSync.detectConflict({ baseRevisionId: null, hasLocalEdits: true }, { revisionId: 'r1' }), 'conflict');
    });
  </script>
</body>
</html>
