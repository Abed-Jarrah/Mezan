<style>

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}html,body{min-height:100%;background:var(--bg);color:var(--txt);font-family:Cairo,system-ui,sans-serif;overflow-x:hidden}body{line-height:1.45;-webkit-font-smoothing:antialiased}button,input,select{font:inherit}button{border:0;cursor:pointer}input,select{font-size:16px!important;color:var(--txt);background:#0a1019;border:1px solid var(--line);border-radius:16px;min-height:52px;width:100%;padding:12px 14px;outline:none}input:focus,select:focus{border-color:rgba(24,200,163,.7);box-shadow:0 0 0 4px rgba(24,200,163,.08)}label{font-size:12px;color:var(--muted);font-weight:700}.app{width:100%;max-width:510px;min-height:100svh;margin:auto;padding:12px 14px calc(92px + var(--safe));background:radial-gradient(circle at 0 -5%,rgba(87,166,255,.25),transparent 36%),radial-gradient(circle at 100% 0,rgba(24,200,163,.22),transparent 36%),linear-gradient(180deg,#0b1018,#070a10)}

.card{background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.025));border:1px solid var(--line);border-radius:var(--r);padding:16px;margin-bottom:12px;box-shadow:0 18px 50px rgba(0,0,0,.26)}.glass{background:linear-gradient(145deg,rgba(24,200,163,.13),rgba(87,166,255,.10));border-color:rgba(255,255,255,.11)}.hero h2{font-size:22px;line-height:1.35;margin-bottom:8px}.hero p,.copy{font-size:13px;color:#d9e5f3;line-height:1.85}.steps{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin:2px 0 14px}.dot{height:6px;border-radius:20px;background:#202a3a}.dot.on{background:linear-gradient(90deg,var(--accent),var(--accent2))}.title{font-size:18px;font-weight:800;margin-bottom:6px}.desc{font-size:12px;color:var(--muted);line-height:1.8;margin-bottom:14px}.form{display:grid;gap:13px}.field{display:grid;gap:7px;min-width:0}.split{display:grid;grid-template-columns:1fr 1fr;gap:10px}.choices{display:grid;grid-template-columns:1fr 1fr;gap:10px}.chip{min-height:52px;border-radius:16px;background:#0a1019;border:1px solid var(--line);color:var(--txt);font-weight:800}.chip.active{background:rgba(24,200,163,.13);border-color:rgba(24,200,163,.65);color:#e4fff8}.btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}.btn{min-height:52px;border-radius:16px;background:linear-gradient(135deg,var(--accent),#0eb68f);color:#03120e;font-weight:900;padding:12px 14px}.btn.sec{background:#172235;color:var(--txt);border:1px solid var(--line2)}.btn.ghost{background:transparent;border:1px solid var(--line);color:var(--muted)}.btn.danger{background:rgba(255,107,131,.12);border:1px solid rgba(255,107,131,.28);color:#ffd2da}.full{grid-column:1/-1}.hint{font-size:11px;color:var(--muted2);font-weight:700}.rowline{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;padding:12px;border:1px solid var(--line);border-radius:18px;background:rgba(255,255,255,.035)}.rowline b{font-size:13px}.rowline small{display:block;color:var(--muted);font- d rgba(24,200,163,.4);color:#e3fff7;border-radius:16px;padding:12px 14px;font-weight:800;font-size:13px}.toast.show{transform:translateY(0)}
@media(max-width:430px){.app{padding-left:12px;padding-right:12px}.top{margin-left:-12px;margin-right:-12px}.hero h2{font-size:20px}.split,.choices{grid-template-columns:1fr}.grid{gap:9px}.val{font-size:17px}.btns{grid-template-columns:1fr}.tabsin{gap:4px}.tab{font-size:10.5px}.lang button{padding:7px 8px}.card{padding:14px}}

<body>

<script>
const KEY='mezan_plan_v3'; const $=id=>document.getElementById(id);
let state=load()||{profile:null,expenses:[],settings:{lang:'ar',currency:'QAR'}};

',based:'حسب صرفك الحالي',surplus:'قد تنهي الشهر بفائض يقارب',over:'قد تتجاوز خطتك بحوالي',lastExpenses:'آخر المصاريف',noExpenses:'لا توجد مصاريف لهذا الشهر بعد.',amount:'المبلغ',merchant:'اسم التاجر / الوصف',date:'التاريخ',category:'التصنيف',auto:'تلقائي',food:'طعام وتسوق',transport:'مواصلات',billsCat:'فواتير',fun:'ترفيه',other:'أخرى',saveExpense:'حفظ المصروف',allExpenses:'كل المصاريف',newest:'الأحدث أولاً',delete:'حذف',budgetTitle:'خطة الشهر حسب النسب',spentFrom:'صرفت من بند المصروفات اليومية',from:'من أصل',privacy:'البيانات والخصوصية',privacyText:'لا يوجد حساب أو مزامنة حالياً. كل البيانات محفوظة محلياً داخل المتصفح.',export:'تصدير',import:'استيراد',editPlan:'تعديل الأسئلة والخطة',reset:'مسح كل البيانات',toastSalary:'أدخل الراتب الشهري أولاً',toastSave:'مبلغ التوفير أكبر من المتاح بعد الالتزامات',toastGoal:'اكتب اسم الهدف',toastDone:'تم إنشاء خطتك المالية',toastExpense:'تم حفظ المصروف',toastAmount:'أدخل مبلغ المصروف'},en:{app:'Mezan',logo:'M',tag:'Salary-based financial planning assistant',local:'100% local',currency:'Currency',startTitle:'Let’s build your financial plan',startDesc:'Choose a currency, then enter your income and commitments. Mezan turns your numbers into a clear plan and useful percentages.',salary:'Monthly salary',extra:'Optional extra income',next:'Next',back:'Back',home:'Home',expense:'Expense',plan:'Plan',settings:'Settings',housing:'Housing and core commitments',housingDesc:'These amounts are deducted from your income before savings and daily spending are calculated.',rentQ:'Do you pay rent?',yes:'Yes',no:'No',rent:'Rent amount',bills:'Monthly bills',internet:'Internet',electricity:'Electricity / Water',phone:'Phone',fixed:'Other commitments',fuel:'Fuel / Transport',payments:'Fixed payments',loans:'Installments / Loans',savingGoal:'Savings and goal',savingDesc:'Available amount is calculated after subtracting commitments from total income.',totalIncome:'Total income',fixedCosts:'Fixed expenses',available:'Available before savings',saveMonthly:'How much do you want to save monthly?',max:'Max',goalType:'Savings goal type',general:'General savings',specific:'Specific goal',goalName:'Goal name',goalAmount:'Goal amount',goalMonths:'In how many months?',review:'Plan review',reviewDesc:'Final step. Percentages show exactly where the user’s income goes.',income:'Total income',saving:'Planned savings',daily:'Daily available',fixedPct:'Your fixed expenses represent',savingPct:'Savings represent',freePct:'Available spending represents',ofIncome:'of your income',adviceOk:'The plan is achievable. Mezan will compare daily spending against the available amount after commitments and savings.',adviceBad:'The plan is higher than your income. Reduce commitments or savings.',approve:'Approve plan',dashTitle:'Professional monthly financial view',dashDesc:'Mezan does not only show numbers; it explains income, commitments, savings, and expenses as decision-ready percentages.',addExpense:'Add expense',viewPlan:'View plan',monthlyIncome:'Monthly income',monthExpenses:'Monthly expenses',remainSpend:'Remaining to spend',goal:'Savings goal',generalSave:'General savings',plannedToSave:'You plan to save',monthly:'monthly',needMonths:'you need about',months:'months',forecast:'End-of-month forecast',based:'based on current spending',surplus:'you may end the month with a surplus around',over:'you may exceed your plan by about',lastExpenses:'Latest expenses',noExpenses:'No expenses this month yet.',amount:'Amount',merchant:'Merchant / description',date:'Date',category:'Category',auto:'Auto',food:'Food & Shopping',transport:'Transport',billsCat:'Bills',fun:'Entertainment',other:'Other',saveExpense:'Save expense',allExpenses:'All expenses',newest:'Newest first',delete:'Delete',budgetTitle:'Monthly plan by percentages',spentFrom:'You spent from daily spending',from:'out of',privacy:'Data & privacy',privacyText:'No account or sync yet. All data is stored locally in the browser.',export:'Export',import:'Import',editPlan:'Edit questions and plan',reset:'Delete all data',toastSalary:'Enter monthly salary first',toastSave:'Savings amount is higher than available after commitments',toastGoal:'Enter goal name',toastDone:'Your financial plan is ready',toastExpense:'Expense saved',toastAmount:'Enter expense amount'}};
function tr(k){return (T[state.settings.lang]||T.ar)[k]||T.ar[k]||k}function dir(){return state.settings.lang==='ar'?'rtl':'ltr'}
function load(){try{return JSON.parse(localStorage.getItem(KEY))}catch{return null}}function save(){localStorage.setItem(KEY,JSON.stringify(state))}
const clean=v=>String(v??'').replace(/,/g,'').replace(/[^0-9.]/g,''); const num=v=>Math.max(0,Number(clean(v)||0));
function fmt(n){return Number(n||0).toLocaleString('en-US',{maximumFractionDigits:0})}function money(n){const c=state.settings.currency||wizard.currency||'QAR';return `${fmt(n)} ${currencySymbols[c]||c}`}
function pct(part,total){return total>0?Math.round((num(part)/total)*100):0}function display(v){return num(v)?fmt(num(v)):''}
function formatMoneyField(el){const raw=clean(el.value); if(!raw){el.value='';return} const parts=raw.split('.'); el.value=Number(parts[0]||0).toLocaleString('en-US')+(parts.length>1?'.'+parts.slice(1).join('').slice(0,2):'')}
function attachMoneyFormatting(){document.querySelectorAll('[data-money]').forEach(el=>el.addEventListener('input',()=>formatMoneyField(el)))}
function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}
function applyLocale(){document.documentElement.lang=state.settings.lang;document.documentElement.dir=dir();$('appName').textContent=tr('app');$('logo').textContent=tr('logo');$('tagline').textContent=tr('tag');$('arBtn').classList.toggle('active',state.settings.lang==='ar');$('enBtn').classList.toggle('active',state.settings.lang==='en');document.querySelectorAll('[data-i18n]').forEach(e=>e.textContent=tr(e.dataset.i18n))}
function setLang(l){state.settings.lang=l;save();applyLocale();init()}
function setCurrency(c){wizard.currency=c;state.settings.currency=c;save();renderWizard()}
function totalsFromWizard(){const income=num(wizard.salary)+num(wizard.extraIncome),fixed=num(wizard.rent)+num(wizard.internet)+num(wizard.electricity)+num(wizard.phone)+num(wizard.fuel)+num(wizard.fixed)+num(wizard.loans),saving=num(wizard.saveTarget),free=income-fixed-saving;return{income,fixed,saving,available:Math.max(0,income-fixed),free}}
function totalIncome(){const p=state.profile||{};return num(p.salary)+num(p.extraIncome)}function fixedCosts(){const p=state.profile||{};return num(p.rent)+num(p.internet)+num(p.electricity)+num(p.phone)+num(p.fuel)+num(p.fixed)+num(p.loans)}function plannedSaving(){return num(state.profile?.saveTarget)}function monthKey(){return new Date().toISOString().slice(0,7)}function thisMonthExpenses(){return state.expenses.filter(e=>(e.date||'').slice(0,7)===monthKey())}function variableSpent(){return thisMonthExpenses().reduce((s,e)=>s+num(e.amount),0)}
function init(){applyLocale(); if(!state.profile){$('onboarding').classList.remove('hidden');$('appArea').classList.add('hidden');$('tabs').classList.add('hidden');renderWizard()}else{$('onboarding').classList.add('hidden');$('appArea').classList.remove('hidden');$('tabs').classList.remove('hidden');renderAll();showTab('dashboard')}}
function dots(){return `<div class="steps">${Array.from({length:6},(_,i)=>`<div class="dot ${i<=wizard.step?'on':''}"></div>`).join('')}</div>`}
function wrap(title,desc,body){return `<div class="card glass hero"><h2>${title}</h2><p>${desc}</p></div><div class="card">${dots()}<div class="title">${title}</div><div class="desc">${desc}</div><div class="form">${body}</div></div>`}
function nav(back=true){return `<div class="btns">${back?`<button class="btn sec" onclick="prevStep()">${tr('back')}</button>`:''}<button class="btn ${back?'':'full'}" onclick="nextStep()">${tr('next')}</button></div>`}
function renderWizard(){collect(); let b=''; const t=totalsFromWizard();
if(wizard.step===0)b=wrap(tr('startTitle'),tr('startDesc'),`<div class="field"><label>${tr('currency')}</label><select onchange="setCurrency(this.value)">${currencies.map(c=>`<option value="${c}" ${wizard.currency===c?'selected':''}>${c} — ${currencySymbols[c]||c}</option>`).join('')}</select></div><div class="field"><label>${tr('salary')}</label><input id="salary" data-money inputmode="decimal" value="${display(wizard.salary)}" placeholder="16,000"></div><div class="field"><label>${tr('extra')}</label><input id="extraIncome" data-money inputmode="decimal" value="${display(wizard.extraIncome)}" placeholder="0"></div>${nav(false)}`);
if(wizard.step===1)b=wrap(tr('housing'),tr('housingDesc'),`<div class="field"><label>${tr('rentQ')}</label><div class="choices"><button class="chip ${wizard.rentPaid==='yes'?'active':''}" onclick="setChoice('rentPaid','yes')">${tr('yes')}</button><button class="chip ${wizard.rentPaid==='no'?'active':''}" onclick="setChoice('rentPaid','no')">${tr('no')}</button></div></div>${wizard.rentPaid==='yes'?`<div class="field"><label>${tr('rent')}</label><input id="rent" data-money inputmode="decimal" value="${display(wizard.rent)}" placeholder="4,000"></div>`:''}${nav()}`);
if(wizard.step===2)b=wrap(tr('bills'),tr('housingDesc'),`<div class="split"><div class="field"><label>${tr('internet')}</label><input id="internet" data-money inputmode="decimal" value="${display(wizard.internet)}" placeholder="300"></div><div class="field"><label>${tr('electricity')}</label><input id="electricity" data-money inputmode="decimal" value="${display(wizard.electricity)}" placeholder="500"></div></div><div class="split"><div class="field"><label>${tr('phone')}</label><input id="phone" data-money inputmode="decimal" value="${display(wizard.phone)}" placeholder="150"></div><div class="field"><label>${tr('fuel')}</label><input id="fuel" data-money inputmode="decimal" value="${display(wizard.fuel)}" placeholder="800"></div></div>${nav()}`);
if(wizard.step===3)b=wrap(tr('fixed'),tr('housingDesc'),`<div class="split"><div class="field"><label>${tr('payments')}</label><input id="fixed" data-money inputmode="decimal" value="${display(wizard.fixed)}" placeholder="500"></div><div class="field"><label>${tr('loans')}</label><input id="loans" data-money inputmode="decimal" value="${display(wizard.loans)}" placeholder="1,200"></div></div>${nav()}`);
if(wizard.step===4)b=wrap(tr('savingGoal'),tr('savingDesc'),`<div class="grid"><div class="metric"><div class="lab">${tr('totalIncome')}</div><div class="val good">${money(t.income)}</div></div><div class="metric"><div class="lab">${tr('fixedCosts')}</div><div class="val yellow">${money(t.fixed)}</div><span class="pct">${pct(t.fixed,t.income)}%</span></div><div class="metric wide"><div class="lab">${tr('available')}</div><div class="val blue">${money(t.available)}</div></div></div><div class="field"><label>${tr('saveMonthly')} <span class="hint">${tr('max')}: ${money(t.available)}</span></label><input id="saveTarget" data-money inputmode="decimal" value="${display(wizard.saveTarget)}" placeholder="${fmt(Math.min(t.available,1500))}"></div><div class="field"><label>${tr('goalType')}</label><div class="choices"><button class="chip ${wizard.goalType==='general'?'active':''}" onclick="setChoice('goalType','general')">${tr('general')}</button><button class="chip ${wizard.goalType==='specific'?'active':''}" onclick="setChoice('goalType','specific')">${tr('specific')}</button></div></div>${wizard.goalType==='specific'?`<div class="field"><label>${tr('goalName')}</label><input id="goalName" value="${wizard.goalName}" placeholder="${state.settings.lang==='ar'?'سيارة، سفر، بيت':'Car, travel, house'}"></div><div class="split"><div class="field"><label>${tr('goalAmount')}</label><input id="goalAmount" data-money inputmode="decimal" value="${display(wizard.goalAmount)}" placeholder="30,000"></div><div class="field"><label>${tr('goalMonths')}</label><input id="goalMonths" type="number" inputmode="numeric" value="${wizard.goalMonths}" placeholder="12"></div></div>`:''}${nav()}`);
if(wizard.step===5)b=wrap(tr('review'),tr('reviewDesc'),`<div class="grid"><div class="metric"><div class="lab">${tr('income')}</div><div class="val good">${money(t.income)}</div></div><div class="metric"><div class="lab">${tr('fixedCosts')}</div><div class="val yellow">${money(t.fixed)}</div><span class="pct">${pct(t.fixed,t.income)}%</span></div><div class="metric"><div class="lab">${tr('saving')}</div><div class="val blue">${money(t.saving)}</div><span class="pct">${pct(t.saving,t.income)}%</span></div><div class="metric"><div class="lab">${tr('daily')}</div><div class="val ${t.free>=0?'good':'bad'}">${money(Math.max(0,t.free)/30)}</div><span class="pct">${pct(Math.max(0,t.free),t.income)}%</span></div></div><div class="notice">${tr('fixedPct')} <b>${pct(t.fixed,t.income)}%</b> ${tr('ofIncome')}. ${tr('savingPct')} <b>${pct(t.saving,t.income)}%</b>. ${tr('freePct')} <b>${pct(Math.max(0,t.free),t.income)}%</b>.</div><p class="copy">${t.free<0?'⚠️ '+tr('adviceBad'):'✅ '+tr('adviceOk')}</p><div class="btns"><button class="btn sec" onclick="prevStep()">${tr('back')}</button><button class="btn" onclick="finishWizard()">${tr('approve')}</button></div>`);
$('onboarding').innerHTML=b;attachMoneyFormatting();}
function collect(){['salary','extraIncome','rent','internet','electricity','phone','fuel','fixed','loans','saveTarget','goalName','goalAmount','goalMonths'].forEach(id=>{const el=$(id);if(el)wizard[id]=el.value}); if(wizard.rentPaid==='no')wizard.rent=''}
function setChoice(k,v){collect();wizard[k]=v;renderWizard()}function nextStep(){collect();const t=totalsFromWizard();if(wizard.step===0&&num(wizard.salary)<=0){toast(tr('toastSalary'));return}if(wizard.step===4&&num(wizard.saveTarget)>t.available){toast(tr('toastSave'));return}if(wizard.step===4&&wizard.goalType==='specific'&&!wizard.goalName.trim()){toast(tr('toastGoal'));return}wizard.step=Math.min(5,wizard.step+1);renderWizard()}function prevStep(){collect();wizard.step=Math.max(0,wizard.step-1);renderWizard()}
function finishWizard(){collect();state.settings.currency=wizard.currency;state.profile={salary:num(wizard.salary),extraIncome:num(wizard.extraIncome),rentPaid:wizard.rentPaid,rent:num(wizard.rent),internet:num(wizard.internet),electricity:num(wizard.electricity),phone:num(wizard.phone),fuel:num(wizard.fuel),fixed:num(wizard.fixed),loans:num(wizard.loans),saveTarget:num(wizard.saveTarget),goalType:wizard.goalType,goalName:wizard.goalName||tr('generalSave'),goalAmount:num(wizard.goalAmount),goalMonths:num(wizard.goalMonths)};save();init();toast(tr('toastDone'))}
function restartWizard(){const p=state.profile||{};wizard={step:0,currency:state.settings.currency||'QAR',salary:p.salary||'',extraIncome:p.extraIncome||'',rentPaid:p.rentPaid||'no',rent:p.rent||'',internet:p.internet||'',electricity:p.electricity||'',phone:p.phone||'',fuel:p.fuel||'',fixed:p.fixed||'',loans:p.loans||'',saveTarget:p.saveTarget||'',goalType:p.goalType||'general',goalName:p.goalName||'',goalAmount:p.goalAmount||'',goalMonths:p.goalMonths||''};state.profile=null;save();init()}
function renderAll(){renderDashboard();renderExpense();renderBudget();renderSettings()}
function renderDashboard(){const income=totalIncome(),fixed=fixedCosts(),saving=plannedSaving(),spent=variableSpent(),variable=Math.max(0,income-fixed-saving),remaining=variable-spent,day=new Date().getDate(),days=new Date(new Date().getFullYear(),new Date().getMonth()+1,0).getDate(),forecast=remaining-((spent/Math.max(1,day))*(days-day));const p=state.profile;$('dashboard').innerHTML=`<div class="card glass hero"><h2>${tr('dashTitle')}</h2><p>${tr('dashDesc')}</p><div class="btns"><button class="btn" onclick="showTab('expense')">${tr('addExpense')}</button><button class="btn sec" onclick="showTab('budget')">${tr('viewPlan')}</button></div></div><div class="grid"><div class="metric"><div class="lab">${tr('monthlyIncome')}</div><div class="val good">${money(income)}</div></div><div class="metric"><div class="lab">${tr('fixedCosts')}</div><div class="val yellow">${money(fixed)}</div><span class="pct">${pct(fixed,income)}%</span></div><div class="metric"><div class="lab">${tr('monthExpenses')}</div><div class="val ${spent>variable?'bad':'blue'}">${money(spent)}</div><span class="pct">${pct(spent,income)}%</span></div><div class="metric"><div class="lab">${tr('remainSpend')}</div><div class="val ${remaining>=0?'good':'bad'}">${money(remaining)}</div></div></div><div class="card"><div class="section"><h3>${tr('goal')}</h3><span class="hint">${p.goalName||tr('generalSave')}</span></div><p class="copy">${tr('plannedToSave')} <b class="good">${money(saving)}</b> ${tr('monthly')}. ${p.goalType==='specific'&&p.goalAmount?`${tr('goal')}: <b>${money(p.goalAmount)}</b>، ${tr('needMonths')} <b>${Math.ceil(p.goalAmount/Math.max(1,saving))}</b> ${tr('months')}.`:''}</p><div class="barwrap"><div class="bar" style="width:${Math.min(100,pct(saving,income))}%"></div></div></div><div class="card"><div class="section"><h3>${tr('forecast')}</h3><span class="hint">${tr('based')}</span></div><p class="copy">${forecast>=0?'✅ '+tr('surplus')+' <b class="good">'+money(forecast)+'</b>.':'⚠️ '+tr('over')+' <b class="bad">'+money(Math.abs(forecast))+'</b>.'}</p></div><div class="card"><div class="section"><h3>${tr('lastExpenses')}</h3><span class="hint">${tr('monthly')}</span></div>${expenseList(5)}</div>`}
function renderExpense(){$('expense').innerHTML=`<div class="card"><div class="section"><h3>${tr('addExpense')}</h3><span class="hint">${tr('auto')}</span></div><div class="form"><div class="field"><label>${tr('amount')}</label><input id="exAmount" data-money inputmode="decimal" placeholder="75"></div><div class="field"><label>${tr('merchant')}</label><input id="exMerchant" placeholder="Carrefour, Uber..."></div><div class="split"><div class="field"><label>${tr('date')}</label><input id="exDate" type="date" value="${new Date().toISOString().slice(0,10)}"></div><div class="field"><label>${tr('category')}</label><select id="exCategory"><option>${tr('auto')}</option><option>${tr('food')}</option><option>${tr('transport')}</option><option>${tr('billsCat')}</option><option>${tr('fun')}</option><option>${tr('other')}</option></select></div></div><button class="btn" onclick="addExpense()">${tr('saveExpense')}</button></div></div><div class="card"><div class="section"><h3>${tr('allExpenses')}</h3><span class="hint">${tr('newest')}</span></div>${expenseList(50)}</div>`;attachMoneyFormatting()}
function categoryByMerchant(m){m=(m||'').toLowerCase();if(/uber|taxi|fuel|petrol|بنزين|كريم/.test(m))return tr('transport');if(/carrefour|market|مطعم|restaurant|food|grocery/.test(m))return tr('food');if(/ooredoo|vodafone|kahramaa|internet|phone/.test(m))return tr('billsCat');return tr('other')}
function addExpense(){const amount=num($('exAmount').value),merchant=$('exMerchant').value.trim(),date=$('exDate').value,chosen=$('exCategory').value;if(!amount){toast(tr('toastAmount'));return}const cat=chosen===tr('auto')?categoryByMerchant(merchant):chosen;state.expenses.unshift({id:Date.now(),amount,merchant:merchant||tr('expense'),category:cat,date});save();renderAll();showTab('dashboard');toast(tr('toastExpense'))}
function expenseList(limit){const arr=thisMonthExpenses().slice(0,limit);if(!arr.length)return `<div class="empty">${tr('noExpenses')}</div>`;return `<div class="list">${arr.map(e=>`<div class="rowline"><div><b>${e.merchant}</b><small>${e.date} • ${e.category}</small></div><div style="text-align:${dir()==='rtl'?'left':'right'}"><div class="money">${money(e.amount)}</div><button class="chip" style="min-height:auto;padding:5px 8px;font-size:10px;margin-top:5px" onclick="deleteExpense(${e.id})">${tr('delete')}</button></div></div>`).join('')}</div>`}
function deleteExpense(id){state.expenses=state.expenses.filter(e=>e.id!==id);save();renderAll()}
function renderBudget(){const income=totalIncome(),fixed=fixedCosts(),saving=plannedSaving(),variable=Math.max(0,income-fixed-saving),spent=variableSpent();const items=[[tr('rent'),state.profile.rent],[tr('internet'),state.profile.internet],[tr('electricity'),state.profile.electricity],[tr('phone'),state.profile.phone],[tr('fuel'),state.profile.fuel],[tr('payments'),state.profile.fixed],[tr('loans'),state.profile.loans],[tr('saving'),saving],[tr('remainSpend'),variable]];$('budget').innerHTML=`<div class="card"><div class="section"><h3>${tr('budgetTitle')}</h3><span class="hint">${money(income)}</span></div>${items.filter(i=>num(i[1])>0).map(([name,val])=>{const p=pct(val,income);return `<div class="rowline" style="display:block"><div class="section" style="margin-bottom:6px"><b>${name}</b><span class="money">${money(val)} • ${p}%</span></div><div class="barwrap"><div class="bar ${p>45?'warn':''}" style="width:${Math.min(100,p)}%"></div></div></div>`}).join('')}<p class="copy">${tr('spentFrom')} <b>${money(spent)}</b> ${tr('from')} <b>${money(variable)}</b>.</p></div>`}
function renderSettings(){$('settings').innerHTML=`<div class="card"><div class="section"><h3>${tr('privacy')}</h3><span class="hint">${tr('local')}</span></div><p class="copy">${tr('privacyText')}</p><div class="field" style="margin-top:12px"><label>${tr('currency')}</label><select onchange="state.settings.currency=this.value;save();renderAll()">${currencies.map(c=>`<option value="${c}" ${state.settings.currency===c?'selected':''}>${c} — ${currencySymbols[c]||c}</option>`).join('')}</select></div><div class="btns"><button class="btn sec" onclick="exportData()">${tr('export')}</button><button class="btn sec" onclick="document.getElementById('importFile').click()">${tr('import')}</button><button class="btn ghost full" onclick="restartWizard()">${tr('editPlan')}</button><button class="btn danger full" onclick="resetAll()">${tr('reset')}</button></div><input id="importFile" type="file" accept="application/json" class="hidden" onchange="importData(event)"></div>`}
function exportData(){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(state,null,2)],{type:'application/json'}));a.download='mezan-backup.json';a.click();URL.revokeObjectURL(a.href)}function importData(ev){const f=ev.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{state=JSON.parse(r.result);save();init()}catch{toast('Invalid file')}};r.readAsText(f)}function resetAll(){if(confirm('Delete all Mezan data?')){localStorage.removeItem(KEY);state={profile:null,expenses:[],settings:{lang:state.settings.lang,currency:state.settings.currency}};init()}}
function showTab(id){document.querySelectorAll('.panel').forEach(p=>p.classList.add('hidden'));$(id).classList.remove('hidden');document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===id));window.scrollTo({top:0,behavior:'smooth'})}
init();
</script>
</body>
</html>
