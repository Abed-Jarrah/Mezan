<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#07090f" />
  <title>ميزان - واجهة احترافية</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root{
      --bg:#080B12;--bg2:#0C111C;--surface:#111827;--surface2:#151E2E;--elevated:#182235;
      --line:rgba(255,255,255,.075);--line2:rgba(255,255,255,.12);
      --text:#F7FAFC;--muted:#93A4B8;--muted2:#65758A;
      --green:#19C99A;--green2:#0FAE86;--blue:#5B8DEF;--red:#EF6B7A;--yellow:#E9B949;
      --radius:24px;--radius-sm:16px;--shadow:0 18px 55px rgba(0,0,0,.32);--safe-bottom:env(safe-area-inset-bottom,0px);
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{min-height:100%;background:var(--bg);font-family:'IBM Plex Sans Arabic',system-ui,-apple-system,sans-serif;color:var(--text);overflow-x:hidden}
    body{overscroll-behavior:none;-webkit-font-smoothing:antialiased;letter-spacing:-.01em}
    button,input,select{font:inherit} input,select{font-size:16px!important} button{cursor:pointer} input[type=date]{color-scheme:dark}
    .shell{width:100%;max-width:480px;margin:0 auto;min-height:100svh;padding:12px 14px calc(88px + var(--safe-bottom));background:radial-gradient(circle at 50% -18%,rgba(47,69,112,.55) 0,rgba(8,11,18,0) 48%),linear-gradient(180deg,var(--bg2),var(--bg));}
    .top{position:sticky;top:0;z-index:5;margin:-12px -14px 14px;padding:12px 14px 10px;background:linear-gradient(180deg,rgba(8,11,18,.96),rgba(8,11,18,.78));backdrop-filter:blur(18px);border-bottom:1px solid rgba(255,255,255,.045)}
    .top-inner{display:flex;align-items:center;justify-content:space-between;gap:12px;max-width:480px;margin:0 auto}
    .brand{display:flex;align-items:center;gap:11px;min-width:0}.logo{width:40px;height:40px;border-radius:18px;background:linear-gradient(145deg,#22E0AE,#4BA3FF);display:grid;place-items:center;font-weight:800;color:#06110e;box-shadow:0 10px 28px rgba(25,201,154,.18);flex:0 0 auto}
    h1{font-size:19px;line-height:1.1;font-weight:700}.sub{font-size:11.5px;color:var(--muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.privacy{font-size:10.5px;color:#B9FFF0;border:1px solid rgba(25,201,154,.28);background:rgba(25,201,154,.075);border-radius:999px;padding:7px 10px;white-space:nowrap}
    .card{background:linear-gradient(180deg,rgba(255,255,255,.055),rgba(255,255,255,.025));border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:12px}.flat{box-shadow:none;background:rgba(17,24,39,.78)}
    .hero{padding:18px;background:linear-gradient(145deg,rgba(25,201,154,.14),rgba(91,141,239,.11));border-color:rgba(255,255,255,.09)}.hero h2{font-size:21px;margin-bottom:7px;font-weight:700}.hero p{font-size:13px;line-height:1.8;color:#D9E4F2}.hero-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
    .steps{display:flex;gap:6px;margin:12px 0}.step-dot{height:6px;flex:1;border-radius:999px;background:#202838}.step-dot.active{background:linear-gradient(90deg,var(--green),var(--blue))}
    .q-title{font-size:18px;font-weight:700;margin-bottom:5px}.q-desc{font-size:12.5px;color:var(--muted);line-height:1.75;margin-bottom:12px}.form{display:grid;gap:10px}.field{display:grid;gap:6px}.field label,.field span{font-size:12px;color:var(--muted)}
    input,select{width:100%;border:1px solid rgba(255,255,255,.10);background:#0B111C;color:var(--text);border-radius:17px;padding:12px 13px;outline:none;min-height:48px}input:focus,select:focus{border-color:rgba(25,201,154,.7);box-shadow:0 0 0 4px rgba(25,201,154,.075)}
    .choice{display:grid;grid-template-columns:1fr 1fr;gap:9px}.chip{border:1px solid rgba(255,255,255,.10);background:#0B111C;color:var(--text);border-radius:17px;padding:12px;font-weight:700}.chip.active{border-color:rgba(25,201,154,.75);background:rgba(25,201,154,.10);color:#E2FFF7}
    .split{display:grid;grid-template-columns:1fr 1fr;gap:9px}.btns{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:12px}.btn{border:0;border-radius:17px;min-height:48px;padding:12px 14px;background:linear-gradient(135deg,var(--green),var(--green2));color:#04120E;font-weight:700;box-shadow:0 10px 24px rgba(25,201,154,.16)}.btn.secondary{background:#192338;color:var(--text);border:1px solid var(--line2);box-shadow:none}.btn.ghost{background:transparent;color:var(--muted);border:1px solid var(--line);box-shadow:none}.btn.full{grid-column:1/-1}.btn.danger{background:rgba(239,107,122,.12);color:#FFD0D6;border:1px solid rgba(239,107,122,.32);box-shadow:none}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.grid.mini .wide{grid-column:1/-1}.metric{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.075);border-radius:20px;padding:13px;min-width:0}.label{font-size:11.5px;color:var(--muted);margin-bottom:6px}.value{font-size:19px;font-weight:700;line-height:1.25;word-break:break-word}.good{color:var(--green)}.bad{color:var(--red)}.blue{color:var(--blue)}.yellow{color:var(--yellow)}
    .section-title{display:flex;align-items:center;justify-content:space-between;gap:8px;margin:2px 2px 10px}.section-title h3{font-size:16px;font-weight:700}.hint{font-size:11.5px;color:var(--muted)}
    .progress{height:9px;background:#222A39;border-radius:999px;overflow:hidden;margin-top:9px}.bar{height:100%;width:0;background:linear-gradient(90deg,var(--green),var(--blue));border-radius:999px;transition:.3s}.bar.red{background:linear-gradient(90deg,var(--yellow),var(--red))}
    .advice{font-size:13px;line-height:1.85;color:#DCE7F4}.advice strong{color:var(--green)}
    .budgetItem{margin-bottom:12px}.budgetTop{display:flex;justify-content:space-between;gap:10px;font-size:12px;margin-bottom:7px;color:#dce8f7}.budgetTop b{font-size:13px}.list{display:grid;gap:9px}.row{display:flex;justify-content:space-between;align-items:center;gap:10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.075);border-radius:18px;padding:12px}.row small{display:block;color:var(--muted);margin-top:3px}.pill{font-size:10.5px;border-radius:999px;padding:5px 8px;background:#172238;color:#cbd5e1;white-space:nowrap}.empty{text-align:center;color:var(--muted);padding:22px 10px;line-height:1.8}.hidden{display:none!important}
    .tabs{position:fixed;z-index:20;bottom:0;left:0;right:0;background:rgba(8,11,18,.92);backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,.08);padding:8px 10px calc(8px + var(--safe-bottom));display:flex;justify-content:center;gap:6px}.tabs-inner{width:100%;max-width:480px;display:grid;grid-template-columns:repeat(4,1fr);gap:6px}.tab{border:0;background:transparent;color:var(--muted);font-size:11px;font-weight:700;padding:9px 4px;border-radius:15px}.tab.active{background:rgba(25,201,154,.10);color:#DFFFF6;border:1px solid rgba(25,201,154,.20)}
    .toast{position:fixed;top:14px;left:12px;right:12px;max-width:480px;margin:auto;background:#102018;border:1px solid rgba(25,201,154,.42);color:#dffcef;border-radius:16px;padding:12px 14px;font-size:13px;font-weight:700;box-shadow:var(--shadow);transform:translateY(-140%);transition:.25s;z-index:30}.toast.show{transform:translateY(0)}
    @media(max-width:370px){.shell{padding-left:10px;padding-right:10px}.top{margin-left:-10px;margin-right:-10px}.privacy{display:none}.grid,.split,.choice,.hero-actions{grid-template-columns:1fr}.value{font-size:17px}.hero h2{font-size:20px}.btns{grid-template-columns:1fr}.tabs-inner{gap:4px}.tab{font-size:10px}}
    @media(min-width:700px){.shell{border-left:1px solid rgba(255,255,255,.04);border-right:1px solid rgba(255,255,255,.04)}}
  </style>
</head>
<body>
  <div class="toast" id="toast"></div>
  <main class="shell">
    <header class="top"><div class="top-inner"><div class="brand"><div class="logo">م</div><div><h1>ميزان</h1><div class="sub">مساعد تخطيط مالي مبني على راتبك</div></div></div><div class="privacy">محلي 100%</div></div></header>

    <section id="onboarding"></section>

    <section id="app" class="hidden">
      <div id="dashboard" class="tabPanel"></div>
      <div id="expense" class="tabPanel hidden"></div>
      <div id="budget" class="tabPanel hidden"></div>
      <div id="settings" class="tabPanel hidden"></div>
    </section>
  </main>

  <nav class="tabs hidden" id="tabs"><div class="tabs-inner">
    <button class="tab active" data-tab="dashboard" onclick="showTab('dashboard')">الرئيسية</button>
    <button class="tab" data-tab="expense" onclick="showTab('expense')">مصروف</button>
    <button class="tab" data-tab="budget" onclick="showTab('budget')">الخطة</button>
    <button class="tab" data-tab="settings" onclick="showTab('settings')">إعدادات</button>
  </div></nav>

<script>
const KEY='mezan_plan_v2';
const $=id=>document.getElementById(id);
let state=load()||{profile:null,expenses:[]};
let wizard={step:0, salary:'', extraIncome:'', rentPaid:'no', rent:'', internet:'', electricity:'', phone:'', fuel:'', fixed:'', loans:'', saveTarget:'', goalType:'general', goalName:'', goalAmount:'', goalMonths:''};
const fmt=n=>Number(n||0).toLocaleString('en-US',{maximumFractionDigits:0});
const clean=v=>String(v??'').replace(/,/g,'').replace(/[^0-9.]/g,'');
const num=v=>Math.max(0,Number(clean(v)||0));
const display=v=>num(v)?fmt(num(v)):'';
function formatMoneyField(el){const raw=clean(el.value); if(!raw){el.value=''; return;} const parts=raw.split('.'); const int=parts[0]||'0'; el.value=Number(int).toLocaleString('en-US')+(parts.length>1?'.'+parts.slice(1).join('').slice(0,2):'');}
function attachMoneyFormatting(){document.querySelectorAll('input[data-money]').forEach(el=>{formatMoneyField(el); el.addEventListener('input',()=>formatMoneyField(el));});}
function availableBeforeSaving(){return num(wizard.salary)+num(wizard.extraIncome)-num(wizard.rent)-num(wizard.internet)-num(wizard.electricity)-num(wizard.phone)-num(wizard.fuel)-num(wizard.fixed)-num(wizard.loans);}
function save(){localStorage.setItem(KEY,JSON.stringify(state));}
function load(){try{return JSON.parse(localStorage.getItem(KEY)||'null')}catch{return null}}
function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}
function monthKey(d=new Date()){return d.toISOString().slice(0,7)}
function thisMonthExpenses(){const m=monthKey();return state.expenses.filter(e=>(e.date||'').slice(0,7)===m)}
function totalIncome(){const p=state.profile||{};return num(p.salary)+num(p.extraIncome)}
function fixedCosts(){const p=state.profile||{};return num(p.rent)+num(p.internet)+num(p.electricity)+num(p.phone)+num(p.fuel)+num(p.fixed)+num(p.loans)}
function plannedSaving(){const p=state.profile||{};return num(p.saveTarget)}
function freeAfterPlan(){return totalIncome()-fixedCosts()-plannedSaving()}
function variableSpent(){return thisMonthExpenses().reduce((s,e)=>s+num(e.amount),0)}
function categoryByMerchant(txt){txt=(txt||'').toLowerCase(); if(/uber|careem|taxi|fuel|petrol|بنزين|كريم|اوبر/.test(txt))return'مواصلات'; if(/carrefour|lulu|market|grocery|مطعم|restaurant|food|coffee|كوفي|سوبر|بقال/.test(txt))return'طعام وتسوق'; if(/netflix|spotify|cinema|game|ترفيه/.test(txt))return'ترفيه'; if(/ooredoo|vodafone|kahramaa|bill|فاتورة|كهربا|انترنت/.test(txt))return'فواتير'; return'أخرى'}
function init(){ if(state.profile){$('onboarding').classList.add('hidden');$('app').classList.remove('hidden');$('tabs').classList.remove('hidden');renderAll();} else renderWizard(); }
function renderWizard(){
  $('onboarding').classList.remove('hidden');$('app').classList.add('hidden');$('tabs').classList.add('hidden');
  const steps=5; const dots='<div class="steps">'+Array.from({length:steps},(_,i)=>`<div class="step-dot ${i<=wizard.step?'active':''}"></div>`).join('')+'</div>';
  const wrap=(title,desc,body)=>`<div class="hero card"><h2>خلينا نبني خطتك</h2><p>أجب على أسئلة بسيطة، وميزان سيحوّل راتبك إلى خطة شهرية قابلة للتنفيذ.</p></div><div class="card flat">${dots}<div class="q-title">${title}</div><div class="q-desc">${desc}</div><div class="form">${body}</div></div>`;
  let body='';
  if(wizard.step===0){body=wrap('الدخل الشهري','أدخل راتبك وأي دخل إضافي متكرر.',`<div class="field"><label>الراتب الشهري</label><input type="text" inputmode="decimal" data-money id="salary" value="${display(wizard.salary)}" placeholder="مثلاً 8,000"></div><div class="field"><label>دخل إضافي شهري (اختياري)</label><input type="text" inputmode="decimal" data-money id="extraIncome" value="${display(wizard.extraIncome)}" placeholder="عمل إضافي، إيجار، مشروع..."></div>${navBtns(false)}`)}
  if(wizard.step===1){body=wrap('السكن والفواتير','هذه مصاريف ثابتة يضعها التطبيق أولاً قبل حساب قدرتك على التوفير.',`<div class="field"><label>هل تدفع إيجار منزل؟</label><div class="choice"><button type="button" class="chip ${wizard.rentPaid==='yes'?'active':''}" onclick="setChoice('rentPaid','yes')">نعم</button><button type="button" class="chip ${wizard.rentPaid==='no'?'active':''}" onclick="setChoice('rentPaid','no')">لا</button></div></div><div class="field ${wizard.rentPaid==='yes'?'':'hidden'}"><label>قيمة الإيجار</label><input type="text" inputmode="decimal" data-money id="rent" value="${display(wizard.rent)}" placeholder="مثلاً 3,500"></div><div class="split"><div class="field"><label>إنترنت</label><input type="text" inputmode="decimal" data-money id="internet" value="${display(wizard.internet)}" placeholder="0"></div><div class="field"><label>كهرباء / ماء</label><input type="text" inputmode="decimal" data-money id="electricity" value="${display(wizard.electricity)}" placeholder="0"></div></div><div class="field"><label>هاتف</label><input type="text" inputmode="decimal" data-money id="phone" value="${display(wizard.phone)}" placeholder="0"></div>${navBtns(true)}`)}
  if(wizard.step===2){body=wrap('الالتزامات الشهرية','أدخل البنزين، الدفعات الثابتة، والأقساط حتى لا تختلط مع المصروفات اليومية.',`<div class="field"><label>بنزين / مواصلات ثابتة</label><input type="text" inputmode="decimal" data-money id="fuel" value="${display(wizard.fuel)}" placeholder="0"></div><div class="field"><label>دفعات ثابتة أخرى</label><input type="text" inputmode="decimal" data-money id="fixed" value="${display(wizard.fixed)}" placeholder="اشتراكات، تأمين، مدارس..."></div><div class="field"><label>أقساط / ديون</label><input type="text" inputmode="decimal" data-money id="loans" value="${display(wizard.loans)}" placeholder="0"></div>${navBtns(true)}`)}
  if(wizard.step===3){collect(); const income=num(wizard.salary)+num(wizard.extraIncome), fixed=num(wizard.rent)+num(wizard.internet)+num(wizard.electricity)+num(wizard.phone)+num(wizard.fuel)+num(wizard.fixed)+num(wizard.loans), available=Math.max(0,income-fixed); body=wrap('التوفير والهدف','بعد طرح الالتزامات من دخلك، اختر مبلغ توفير يساوي أو أقل من المتاح.',`<div class="grid mini"><div class="metric"><div class="label">مجموع الدخل</div><div class="value good">${fmt(income)}</div></div><div class="metric"><div class="label">الالتزامات</div><div class="value yellow">${fmt(fixed)}</div></div><div class="metric wide"><div class="label">المتاح قبل التوفير</div><div class="value blue">${fmt(available)}</div></div></div><div class="field"><label>كم ترغب بتوفيره شهرياً؟ <span class="hint">الحد الأعلى ${fmt(available)}</span></label><input type="text" inputmode="decimal" data-money id="saveTarget" value="${display(wizard.saveTarget)}" placeholder="مثلاً ${fmt(Math.min(available,1500))}"></div><div class="field"><label>نوع هدف التوفير</label><div class="choice"><button type="button" class="chip ${wizard.goalType==='general'?'active':''}" onclick="setChoice('goalType','general')">توفير عام</button><button type="button" class="chip ${wizard.goalType==='specific'?'active':''}" onclick="setChoice('goalType','specific')">هدف محدد</button></div></div><div class="${wizard.goalType==='specific'?'':'hidden'}"><div class="field"><label>اسم الهدف</label><input id="goalName" value="${wizard.goalName}" placeholder="سيارة، سفر، بيت..."></div><div class="split"><div class="field"><label>مبلغ الهدف</label><input type="text" inputmode="decimal" data-money id="goalAmount" value="${display(wizard.goalAmount)}" placeholder="30,000"></div><div class="field"><label>خلال كم شهر؟</label><input type="number" inputmode="numeric" id="goalMonths" value="${wizard.goalMonths}" placeholder="12"></div></div></div>${navBtns(true)}`)}
  if(wizard.step===4){collect(); const income=num(wizard.salary)+num(wizard.extraIncome), fixed=num(wizard.rent)+num(wizard.internet)+num(wizard.electricity)+num(wizard.phone)+num(wizard.fuel)+num(wizard.fixed)+num(wizard.loans), saving=num(wizard.saveTarget), free=income-fixed-saving; body=wrap('مراجعة الخطة','هذه النتيجة الأولية. يمكنك تعديلها لاحقاً من الإعدادات.',`<div class="grid"><div class="metric"><div class="label">الدخل الكلي</div><div class="value good">${fmt(income)}</div></div><div class="metric"><div class="label">الالتزامات</div><div class="value yellow">${fmt(fixed)}</div></div><div class="metric"><div class="label">التوفير المخطط</div><div class="value blue">${fmt(saving)}</div></div><div class="metric"><div class="label">المتاح اليومي</div><div class="value ${free>=0?'good':'bad'}">${fmt(free/30)}</div></div></div><p class="advice">${free<0?'⚠️ الخطة حالياً أعلى من دخلك. قلل الالتزامات أو هدف التوفير.':'✅ الخطة قابلة للتنفيذ. ميزان سيقارن مصروفاتك اليومية بالمتاح بعد الالتزامات والتوفير.'}</p><div class="btns"><button class="btn secondary" onclick="prevStep()">رجوع</button><button class="btn" onclick="finishWizard()">اعتماد الخطة</button></div>`)}
  $('onboarding').innerHTML=body;
  attachMoneyFormatting();
}
function navBtns(back){return `<div class="btns">${back?'<button class="btn secondary" type="button" onclick="prevStep()">رجوع</button>':''}<button class="btn ${back?'':'full'}" type="button" onclick="nextStep()">التالي</button></div>`}
function collect(){['salary','extraIncome','rent','internet','electricity','phone','fuel','fixed','loans','saveTarget','goalName','goalAmount','goalMonths'].forEach(id=>{const el=$(id); if(el) wizard[id]=el.value}); if(wizard.rentPaid==='no') wizard.rent='';}
function setChoice(k,v){collect(); wizard[k]=v; renderWizard();}
function nextStep(){collect(); if(wizard.step===0 && num(wizard.salary)<=0){toast('أدخل الراتب الشهري أولاً');return} if(wizard.step===3 && num(wizard.saveTarget)>Math.max(0,availableBeforeSaving())){toast('مبلغ التوفير أكبر من المتاح بعد الالتزامات');return} if(wizard.step===3 && wizard.goalType==='specific' && !wizard.goalName){toast('اكتب اسم الهدف');return} wizard.step=Math.min(4,wizard.step+1); renderWizard();}
function prevStep(){collect(); wizard.step=Math.max(0,wizard.step-1); renderWizard();}
function finishWizard(){collect(); state.profile={salary:num(wizard.salary),extraIncome:num(wizard.extraIncome),rentPaid:wizard.rentPaid,rent:num(wizard.rent),internet:num(wizard.internet),electricity:num(wizard.electricity),phone:num(wizard.phone),fuel:num(wizard.fuel),fixed:num(wizard.fixed),loans:num(wizard.loans),saveTarget:num(wizard.saveTarget),goalType:wizard.goalType,goalName:wizard.goalName||'توفير عام',goalAmount:num(wizard.goalAmount),goalMonths:num(wizard.goalMonths)}; save(); init(); toast('تم إنشاء خطتك المالية');}
function restartWizard(){const p=state.profile||{}; wizard={step:0,salary:p.salary||'',extraIncome:p.extraIncome||'',rentPaid:p.rentPaid||'no',rent:p.rent||'',internet:p.internet||'',electricity:p.electricity||'',phone:p.phone||'',fuel:p.fuel||'',fixed:p.fixed||'',loans:p.loans||'',saveTarget:p.saveTarget||'',goalType:p.goalType||'general',goalName:p.goalName||'',goalAmount:p.goalAmount||'',goalMonths:p.goalMonths||''}; state.profile=null; save(); init();}
function renderAll(){renderDashboard();renderExpense();renderBudget();renderSettings();}
function renderDashboard(){const income=totalIncome(), fixed=fixedCosts(), saving=plannedSaving(), spent=variableSpent(), variable=Math.max(0,income-fixed-saving), remaining=variable-spent, day=new Date().getDate(), days=new Date(new Date().getFullYear(),new Date().getMonth()+1,0).getDate(), forecast=remaining-((spent/day)*(days-day)); const p=state.profile; const progress=p.goalType==='specific'&&p.goalAmount?Math.min(100,(saving/(p.goalAmount))*100):Math.min(100,(saving/Math.max(1,income))*100); $('dashboard').innerHTML=`<div class="hero card"><h2>نظرة مالية واضحة لهذا الشهر</h2><p>هذه ليست لوحة أرقام فقط. ميزان يقارن دخلك، التزاماتك، هدف التوفير، ومصروفاتك اليومية ليخبرك أين تقف فعلياً.</p><div class="hero-actions"><button class="btn" onclick="showTab('expense')">أضف مصروف</button><button class="btn secondary" onclick="showTab('budget')">عرض الخطة</button></div></div><div class="grid"><div class="metric"><div class="label">الدخل الشهري</div><div class="value good">${fmt(income)}</div></div><div class="metric"><div class="label">التزامات ثابتة</div><div class="value yellow">${fmt(fixed)}</div></div><div class="metric"><div class="label">مصروفات الشهر</div><div class="value ${spent>variable?'bad':'blue'}">${fmt(spent)}</div></div><div class="metric"><div class="label">المتبقي للإنفاق</div><div class="value ${remaining>=0?'good':'bad'}">${fmt(remaining)}</div></div></div><div class="card flat"><div class="section-title"><h3>هدف التوفير</h3><span class="hint">${p.goalName||'توفير عام'}</span></div><div class="advice">أنت تخطط لتوفير <strong>${fmt(saving)}</strong> شهرياً. ${p.goalType==='specific'&&p.goalAmount?`هدفك <strong>${fmt(p.goalAmount)}</strong>، وبالخطة الحالية تحتاج تقريباً <strong>${Math.ceil(p.goalAmount/Math.max(1,saving))}</strong> شهر.`:'هذا توفير عام لبناء أمان مالي.'}</div><div class="progress"><div class="bar" style="width:${progress}%"></div></div></div><div class="card flat"><div class="section-title"><h3>توقع نهاية الشهر</h3><span class="hint">حسب صرفك الحالي</span></div><p class="advice">${forecast>=0?`✅ إذا استمريت بنفس النمط، قد تنهي الشهر بفائض يقارب <strong>${fmt(forecast)}</strong>.`:`⚠️ إذا استمريت بنفس النمط، قد تتجاوز خطتك بحوالي <strong>${fmt(Math.abs(forecast))}</strong>.`}</p></div><div class="card flat"><div class="section-title"><h3>آخر المصاريف</h3><span class="hint">هذا الشهر</span></div>${expenseList(5)}</div>`}
function renderExpense(){ $('expense').innerHTML=`<div class="card flat"><div class="section-title"><h3>إضافة مصروف</h3><span class="hint">التصنيف تلقائي</span></div><div class="form"><div class="field"><label>المبلغ</label><input id="exAmount" type="text" inputmode="decimal" data-money placeholder="مثلاً 75"></div><div class="field"><label>اسم التاجر / الوصف</label><input id="exMerchant" placeholder="Carrefour, Uber, مطعم..."></div><div class="split"><div class="field"><label>التاريخ</label><input id="exDate" type="date" value="${new Date().toISOString().slice(0,10)}"></div><div class="field"><label>التصنيف</label><select id="exCategory"><option>تلقائي</option><option>طعام وتسوق</option><option>مواصلات</option><option>فواتير</option><option>ترفيه</option><option>أخرى</option></select></div></div><button class="btn" onclick="addExpense()">حفظ المصروف</button></div></div><div class="card flat"><div class="section-title"><h3>كل المصاريف</h3><span class="hint">الأحدث أولاً</span></div>${expenseList(50)}</div>`; attachMoneyFormatting();}
function addExpense(){const amount=num($('exAmount').value), merchant=$('exMerchant').value.trim(), date=$('exDate').value, chosen=$('exCategory').value; if(!amount){toast('أدخل مبلغ المصروف');return} const cat=chosen==='تلقائي'?categoryByMerchant(merchant):chosen; state.expenses.unshift({id:Date.now(),amount,merchant:merchant||'مصروف',category:cat,date}); save(); renderAll(); toast('تم حفظ المصروف'); showTab('dashboard')}
function expenseList(limit){const arr=thisMonthExpenses().slice(0,limit); if(!arr.length)return `<div class="empty">لا توجد مصاريف لهذا الشهر بعد.</div>`; return `<div class="list">${arr.map(e=>`<div class="row"><div><b>${e.merchant}</b><small>${e.date} • ${e.category}</small></div><div><b>${fmt(e.amount)}</b><br><button class="pill" onclick="deleteExpense(${e.id})">حذف</button></div></div>`).join('')}</div>`}
function deleteExpense(id){state.expenses=state.expenses.filter(e=>e.id!==id);save();renderAll();toast('تم حذف المصروف')}
function renderBudget(){const income=totalIncome(), fixed=fixedCosts(), saving=plannedSaving(), variable=Math.max(0,income-fixed-saving), spent=variableSpent(); const items=[['الإيجار',state.profile.rent],['إنترنت',state.profile.internet],['كهرباء / ماء',state.profile.electricity],['هاتف',state.profile.phone],['بنزين / مواصلات',state.profile.fuel],['دفعات ثابتة',state.profile.fixed],['أقساط',state.profile.loans],['توفير مخطط',saving],['مصروفات يومية مسموحة',variable]]; $('budget').innerHTML=`<div class="card flat"><div class="section-title"><h3>خطة الشهر</h3><span class="hint">الدخل: ${fmt(income)}</span></div>${items.filter(i=>num(i[1])>0).map(([name,val])=>{const w=Math.min(100,num(val)/Math.max(1,income)*100);return `<div class="budgetItem"><div class="budgetTop"><b>${name}</b><span>${fmt(val)}</span></div><div class="progress"><div class="bar" style="width:${w}%"></div></div></div>`}).join('')}<p class="advice">صرفت من بند المصروفات اليومية <strong>${fmt(spent)}</strong> من أصل <strong>${fmt(variable)}</strong>.</p></div>`}
function renderSettings(){ $('settings').innerHTML=`<div class="card flat"><div class="section-title"><h3>البيانات والخصوصية</h3><span class="hint">محفوظة على جهازك</span></div><p class="advice">لا يوجد حساب أو مزامنة حالياً. كل البيانات محفوظة محلياً داخل المتصفح.</p><div class="btns"><button class="btn secondary" onclick="exportData()">تصدير</button><button class="btn secondary" onclick="document.getElementById('importFile').click()">استيراد</button><button class="btn ghost full" onclick="restartWizard()">تعديل الأسئلة والخطة</button><button class="btn danger full" onclick="resetAll()">مسح كل البيانات</button></div><input id="importFile" type="file" accept="application/json" class="hidden" onchange="importData(event)"></div>`}
function exportData(){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(state,null,2)],{type:'application/json'}));a.download='mezan-backup.json';a.click();URL.revokeObjectURL(a.href)}
function importData(ev){const f=ev.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=()=>{try{state=JSON.parse(r.result);save();init();toast('تم استيراد البيانات')}catch{toast('ملف غير صالح')}}; r.readAsText(f)}
function resetAll(){if(confirm('هل تريد مسح كل بيانات ميزان؟')){localStorage.removeItem(KEY);state={profile:null,expenses:[]};init();}}
function showTab(id){document.querySelectorAll('.tabPanel').forEach(p=>p.classList.add('hidden'));$(id).classList.remove('hidden');document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===id));window.scrollTo({top:0,behavior:'smooth'});}
init();
</script>
</body>
</html>
