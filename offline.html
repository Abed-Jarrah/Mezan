<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0F172A" />
  <title>ميزان | دون اتصال</title>
  <link rel="icon" href="assets/icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="css/variables.css" />
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:radial-gradient(circle at 50% 0,color-mix(in srgb,var(--accent) 18%,transparent),transparent 38%),var(--bg);color:var(--txt);font-family:"IBM Plex Sans Arabic",system-ui,sans-serif}.offline{width:min(100%,460px);padding:32px;border:1px solid var(--line2);border-radius:30px;background:linear-gradient(145deg,var(--panel2),var(--bg));text-align:center;box-shadow:0 24px 70px rgba(0,0,0,.28)}.icon{width:88px;height:88px;margin:0 auto 20px;display:grid;place-items:center;border-radius:50%;background:color-mix(in srgb,var(--accent) 12%,transparent);color:var(--accent);font-size:38px;border:1px dashed color-mix(in srgb,var(--accent) 50%,transparent)}h1{margin:0 0 10px}p{color:var(--muted);line-height:1.8}.btn{display:inline-block;margin-top:14px;padding:13px 24px;border:0;border-radius:16px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font:700 15px "IBM Plex Sans Arabic";cursor:pointer}
  </style>
</head>
<body>
  <main class="offline">
    <div class="icon" aria-hidden="true">↻</div>
    <h1>أنت حالياً دون اتصال</h1>
    <p>إذا فتحت ميزان سابقاً فستبقى بياناتك محفوظة على جهازك. أعد المحاولة عندما يعود الاتصال.</p>
    <p lang="en" dir="ltr">You are offline. Your previously saved Mezan data remains on this device.</p>
    <button class="btn" onclick="location.reload()">إعادة المحاولة</button>
  </main>
</body>
</html>
